<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee HR Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --surface: #13161c;
    --surface2: #1a1e26;
    --border: #232830;
    --border2: #2e3440;
    --red: #e8364a;
    --gold: #f0c040;
    --green: #3ecf78;
    --text: #e8ecf2;
    --muted: #6b7585;
    --dim: #3a4050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ── PASSWORD MODAL ── */
  .pw-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .pw-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 32px 28px;
    width: 100%; max-width: 340px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.8);
  }
  .pw-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .pw-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
  }
  .pw-input {
    width: 100%; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 14px;
    letter-spacing: 0.12em; text-align: center;
    outline: none; transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  .pw-input:focus { border-color: var(--red); }
  .pw-btn {
    width: 100%; padding: 10px;
    background: var(--red); border: none; border-radius: 8px;
    color: #fff; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
  }
  .pw-btn:hover { opacity: 0.85; }
  .pw-error {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--red); margin-top: 10px; min-height: 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(232,54,74,0.07) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.012) 39px, rgba(255,255,255,0.012) 40px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    background: rgba(11,13,17,0.96);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--red);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-bottom: 2px;
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; letter-spacing: 0.06em; line-height: 1;
  }
  .header-text h1 span { color: var(--red); }
  .header-text p {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px;
  }

  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); padding-bottom: 4px;
  }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim); transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px rgba(62,207,120,0.5); animation: blink 2s infinite; }
  .status-dot.loading { background: var(--gold); }
  .status-dot.error { background: var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    display: flex;
  }

  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 10px 20px;
    border: none; background: transparent;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--red); }

  main {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .league-view { display: none; }
  .league-view.active { display: block; }

  .lb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }

  .lb-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2);
  }

  .lb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.06em;
  }
  .lb-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-top: 2px;
  }

  .refresh-btn {
    width: 32px; height: 32px;
    border-radius: 6px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); }
  .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

  .lb-row {
    display: grid;
    grid-template-columns: 44px 1fr auto 80px 16px;
    align-items: center; gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(232,54,74,0.05); }
  .lb-row.gold-row { background: rgba(240,192,64,0.04); }
  .lb-row.gold-row:hover { background: rgba(240,192,64,0.08); }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; text-align: center; line-height: 1;
  }
  .gold-row .rank-num { color: var(--gold); }
  .silver-row .rank-num { color: #b0b8c8; }
  .bronze-row .rank-num { color: #c8845a; }
  .rest-row .rank-num { color: var(--dim); }

  .row-info { min-width: 0; }
  .row-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 17px;
    letter-spacing: 0.03em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-owner {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-top: 2px;
  }

  .row-hr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--gold);
    text-align: right; letter-spacing: 0.02em; line-height: 1;
  }
  .row-hr.no-data { color: var(--dim); font-size: 20px; }

  .row-bar-track {
    height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .row-bar-fill {
    height: 100%; background: var(--red);
    border-radius: 2px; transition: width 0.6s ease;
  }
  .gold-row .row-bar-fill { background: var(--gold); }

  .row-chevron { color: var(--dim); font-size: 14px; }

  .lb-empty {
    padding: 48px 24px; text-align: center;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em;
  }
  .spinner-ring {
    width: 24px; height: 24px;
    border: 2px solid var(--border2); border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--dim); text-align: center; margin-top: 14px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82); backdrop-filter: blur(6px);
    z-index: 200; display: none;
    align-items: flex-start; justify-content: center;
    padding: 60px 20px 40px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px; width: 100%; max-width: 460px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    margin: auto; animation: modalIn 0.2s ease;
    position: relative;
  }
  @keyframes modalIn { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:none} }

  .modal-head {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .modal-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }
  .modal-team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 0.05em; line-height: 1; margin: 4px 0 2px;
  }
  .modal-total-wrap { text-align: right; flex-shrink: 0; }
  .modal-total-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }
  .modal-total {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; color: var(--gold);
    line-height: 1; letter-spacing: 0.02em;
  }

  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.2s;
  }
  .modal-close:hover { color: var(--text); background: var(--border); }

  .modal-body { padding: 6px 0 4px; }

  .player-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.12s;
  }
  .player-row:last-child { border-bottom: none; }
  .player-row:hover { background: rgba(255,255,255,0.03); }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; font-size: 15px;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .player-hr {
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: var(--gold); min-width: 52px; text-align: right;
  }
  .player-hr.no-data { color: var(--dim); }

  @media (max-width: 600px) {
    .lb-row { grid-template-columns: 36px 1fr auto 60px 12px; gap: 8px; padding: 12px 16px; }
    .row-hr { font-size: 22px; }
    main { padding: 20px 16px 60px; }
    .header-inner { padding: 16px 16px 0; }
    .tab { padding: 10px 12px; font-size: 12px; }
  }
</style>
</head>

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let hrData = {};
let dataLoaded = false;
let lastFetch = 0;
const CACHE_TTL = 5 * 60 * 1000;
let activeLeague = 'marquee';
let openDetail = null;  // { leagueKey, teamName }

// ═══════════════════════════════════════════════
//  MLB API
// ═══════════════════════════════════════════════
async function fetchHR(force) {
  const now = Date.now();
  if (!force && dataLoaded && now - lastFetch < CACHE_TTL) return;

  setStatus('loading', 'Loading…');
  try {
    const fresh = {};
    // Track per-team entries for players with duplicate names
    const byNameAndTeam = {};
    const BASE = 'https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&season=2026&playerPool=ALL&limit=1000';
    let offset = 0;
    while (true) {
      const r = await fetch(BASE + '&offset=' + offset);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();
      const block = json?.stats?.[0] || {};
      const splits = block.splits || [];
      const total = block.totalSplits || 0;
      for (const s of splits) {
        const n = s.player?.fullName;
        const h = s.stat?.homeRuns;
        const team = s.team?.name || '';
        if (n && h != null) {
          // Store each name+team combo separately
          const key = n + '|' + team;
          byNameAndTeam[key] = { name: n, team, hr: (byNameAndTeam[key]?.hr || 0) + h };
        }
      }
      offset += splits.length;
      if (splits.length === 0 || offset >= total) break;
    }

    // Now resolve: for most players, sum all teams (traded players)
    // Exception: Max Muncy -> use only the Dodgers entry
    const TEAM_OVERRIDES = {
      'Max Muncy': 'Los Angeles Dodgers'
    };

    const playerEntries = {};
    for (const [key, val] of Object.entries(byNameAndTeam)) {
      const { name, team, hr } = val;
      if (!playerEntries[name]) playerEntries[name] = [];
      playerEntries[name].push({ team, hr });
    }

    for (const [name, entries] of Object.entries(playerEntries)) {
      if (TEAM_OVERRIDES[name]) {
        // Use only the specified team's entry
        const match = entries.find(e => e.team === TEAM_OVERRIDES[name]);
        fresh[name] = match ? match.hr : 0;
      } else {
        // Sum across all teams (handles mid-season trades)
        fresh[name] = entries.reduce((sum, e) => sum + e.hr, 0);
      }
    }

    // Map straight-apostrophe API names to curly-apostrophe roster names
    const APOSTROPHE_ALIASES = {
      "Tyler O'Neill": "Tyler O’Neill",
    };
    for (const [apiName, rosterName] of Object.entries(APOSTROPHE_ALIASES)) {
      if (fresh[apiName] != null) {
        fresh[rosterName] = (fresh[rosterName] || 0) + fresh[apiName];
        delete fresh[apiName];
      }
    }

    if (Object.keys(fresh).length === 0) throw new Error('empty');
    hrData = fresh;
    dataLoaded = true;
    lastFetch = now;
    setStatus('live', 'Live');
    renderAll();
    if (openDetail) populateModal(openDetail.leagueKey, openDetail.teamName);
  } catch(e) {
    console.warn('MLB API error:', e);
    setStatus('error', 'Offline');
    if (!dataLoaded) renderAll();
  }
}

function setStatus(cls, txt) {
  document.getElementById('status-dot').className = 'status-dot ' + cls;
  document.getElementById('status-text').textContent = txt;
}

// ═══════════════════════════════════════════════
//  HR LOOKUP
// ═══════════════════════════════════════════════
function getHR(name) {
  if (hrData[name] != null) return hrData[name];

  // Normalize: strip suffixes like Jr., Sr., II, III for fuzzy matching
  const suffixes = ['jr.', 'sr.', 'ii', 'iii', 'iv'];
  function baseName(n) {
    const parts = n.toLowerCase().trim().split(/\s+/);
    const filtered = parts.filter(p => !suffixes.includes(p));
    return filtered.join(' ');
  }
  const needle = baseName(name);
  // Exact base name match after normalization
  for (const [k, v] of Object.entries(hrData)) {
    if (baseName(k) === needle) return v;
  }
  // Last name only fallback
  const lastWord = needle.split(' ').pop();
  for (const [k, v] of Object.entries(hrData)) {
    if (baseName(k).split(' ').pop() === lastWord) return v;
  }
  return null;
}

function teamTotal(players) {
  let total = 0, any = false;
  for (const p of players) {
    const h = getHR(p);
    if (h != null) { total += h; any = true; }
  }
  return any ? total : null;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  Object.keys(LEAGUES).forEach(renderLeague);
}

function renderLeague(key) {
  const el = document.getElementById('view-' + key);
  if (!el) return;
  const league = LEAGUES[key];
  const teams = league.teams;

  let inner;
  if (!dataLoaded) {
    inner = `<div class="lb-empty"><div class="spinner-ring"></div>Fetching live data…</div>`;
  } else if (!teams.length) {
    inner = `<div class="lb-empty">Lineups coming soon</div>`;
  } else {
    const ranked = teams
      .map(t => ({ ...t, total: teamTotal(t.players) }))
      .sort((a, b) => {
        if (a.total == null && b.total == null) return 0;
        if (a.total == null) return 1;
        if (b.total == null) return -1;
        return b.total - a.total;
      });

    const maxHR = Math.max(...ranked.map(t => t.total || 0), 1);

    // Tie-aware ranking
    const trueRanks = ranked.map((t, i) => {
      if (t.total == null) return ranked.length;
      return ranked.findIndex(r => r.total === t.total) + 1;
    });

    inner = ranked.map((t, i) => {
      const rank = trueRanks[i];
      const isTied = t.total != null && ranked.filter(r => r.total === t.total).length > 1;
      const rankLabel = t.total == null ? '—' : (isTied ? 'T' + rank : '' + rank);
      const cls = rank === 1 ? 'gold-row' : rank === 2 ? 'silver-row' : rank === 3 ? 'bronze-row' : 'rest-row';
      const pct = Math.round(((t.total || 0) / maxHR) * 100);
      const hrText = t.total != null ? t.total : (dataLoaded ? '0' : '—');
      const noData = t.total == null;
      return `<div class="lb-row ${cls}" data-league="${key}" data-team="${esc(t.name)}">
        <div class="rank-num" style="${isTied ? 'font-size:15px' : ''}">${rankLabel}</div>
        <div class="row-info">
          <div class="row-name">${esc(t.name)}</div>
          ${t.owner ? `<div class="row-owner">${esc(t.owner)}</div>` : ''}
        </div>
        <div class="row-hr${noData ? ' no-data' : ''}">${hrText}</div>
        <div class="row-bar-track"><div class="row-bar-fill" style="width:${pct}%"></div></div>
        <div class="row-chevron">›</div>
      </div>`;
    }).join('');
  }

  const ts = lastFetch ? `Updated ${timeAgo(lastFetch)}` : '';
  el.innerHTML = `
    <div class="lb-card">
      <div class="lb-header">
        <div>
          <div class="lb-title">${esc(league.label)}</div>
          <div class="lb-subtitle">2026 Season Home Runs</div>
        </div>
        <button class="refresh-btn" id="refresh-${key}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 2.5A6.5 6.5 0 1 1 10 1"/>
            <polyline points="10,1 13.5,2.5 12,6"/>
          </svg>
        </button>
      </div>
      ${inner}
    </div>
    ${ts ? `<div class="last-updated">${ts}</div>` : ''}
  `;

  // Row click handlers
  el.querySelectorAll('.lb-row').forEach(row => {
    row.addEventListener('click', () => {
      openModal(row.dataset.league, row.dataset.team);
    });
  });

  // Refresh button
  const btn = document.getElementById('refresh-' + key);
  if (btn) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      btn.classList.add('spinning');
      lastFetch = 0; dataLoaded = false;
      fetchHR(true).finally(() => btn.classList.remove('spinning'));
    });
  }
}

// ═══════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════
function openModal(leagueKey, teamName) {
  openDetail = { leagueKey, teamName };
  populateModal(leagueKey, teamName);
  document.getElementById('modal').classList.add('open');
}

function populateModal(leagueKey, teamName) {
  const team = LEAGUES[leagueKey]?.teams?.find(t => t.name === teamName);
  if (!team) return;
  const total = teamTotal(team.players);
  document.getElementById('modal-name').textContent = team.name;
  document.getElementById('modal-owner').textContent = team.owner ? 'Owner: ' + team.owner : '';
  document.getElementById('modal-total').textContent = total != null ? total : '—';
  document.getElementById('modal-body').innerHTML = (team.players || []).map(name => {
    const hr = getHR(name);
    return `<div class="player-row">
      <div class="player-name">${esc(name)}</div>
      <div class="player-hr${hr == null ? ' no-data' : ''}">${hr != null ? hr + ' HR' : '—'}</div>
    </div>`;
  }).join('');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  openDetail = null;
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
(function init() {
  // Password protection
  const PROTECTED = ['highrollers', 'extra'];
  const PW = 'marquee';
  let unlockedLeagues = new Set();
  let pendingLeague = null;

  function showPW(league) {
    pendingLeague = league;
    document.getElementById('pw-sub').textContent = 'Enter password to view this tab';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    document.getElementById('pw-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('pw-input').focus(), 50);
  }

  function submitPW() {
    const val = document.getElementById('pw-input').value.trim().toLowerCase();
    if (val === PW) {
      unlockedLeagues.add(pendingLeague);
      document.getElementById('pw-overlay').style.display = 'none';
      switchToLeague(pendingLeague);
      pendingLeague = null;
    } else {
      document.getElementById('pw-error').textContent = 'Incorrect password';
      document.getElementById('pw-input').value = '';
    }
  }

  document.getElementById('pw-submit').addEventListener('click', submitPW);
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPW();
  });

  function switchToLeague(league) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.league-view').forEach(v => v.classList.remove('active'));
    document.querySelector('.tab[data-league="' + league + '"]').classList.add('active');
    activeLeague = league;
    document.getElementById('view-' + activeLeague).classList.add('active');
  }

  // Tabs
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    const league = tab.dataset.league;
    if (PROTECTED.includes(league) && !unlockedLeagues.has(league)) {
      showPW(league);
    } else {
      switchToLeague(league);
    }
  });

  // Modal close
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Initial render + data fetch
  renderAll();
  fetchHR();

  // Auto-refresh every 5 min
  setInterval(() => fetchHR(), CACHE_TTL);
})();
</script>
