<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee HR Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --surface: #13161c;
    --surface2: #1a1e26;
    --border: #232830;
    --border2: #2e3440;
    --red: #e8364a;
    --gold: #f0c040;
    --green: #3ecf78;
    --text: #e8ecf2;
    --muted: #6b7585;
    --dim: #3a4050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(232,54,74,0.07) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.012) 39px, rgba(255,255,255,0.012) 40px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    background: rgba(11,13,17,0.96);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--red);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-bottom: 2px;
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; letter-spacing: 0.06em; line-height: 1;
  }
  .header-text h1 span { color: var(--red); }
  .header-text p {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px;
  }

  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); padding-bottom: 4px;
  }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim); transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px rgba(62,207,120,0.5); animation: blink 2s infinite; }
  .status-dot.loading { background: var(--gold); }
  .status-dot.error { background: var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    display: flex;
  }

  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 10px 20px;
    border: none; background: transparent;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--red); }

  main {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .league-view { display: none; }
  .league-view.active { display: block; }

  .lb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }

  .lb-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2);
  }

  .lb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.06em;
  }
  .lb-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-top: 2px;
  }

  .refresh-btn {
    width: 32px; height: 32px;
    border-radius: 6px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); }
  .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

  .lb-row {
    display: grid;
    grid-template-columns: 44px 1fr auto 80px 16px;
    align-items: center; gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(232,54,74,0.05); }
  .lb-row.gold-row { background: rgba(240,192,64,0.04); }
  .lb-row.gold-row:hover { background: rgba(240,192,64,0.08); }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; text-align: center; line-height: 1;
  }
  .gold-row .rank-num { color: var(--gold); }
  .silver-row .rank-num { color: #b0b8c8; }
  .bronze-row .rank-num { color: #c8845a; }
  .rest-row .rank-num { color: var(--dim); }

  .row-info { min-width: 0; }
  .row-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 17px;
    letter-spacing: 0.03em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-owner {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-top: 2px;
  }

  .row-hr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--gold);
    text-align: right; letter-spacing: 0.02em; line-height: 1;
  }
  .row-hr.no-data { color: var(--dim); font-size: 20px; }

  .row-bar-track {
    height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .row-bar-fill {
    height: 100%; background: var(--red);
    border-radius: 2px; transition: width 0.6s ease;
  }
  .gold-row .row-bar-fill { background: var(--gold); }

  .row-chevron { color: var(--dim); font-size: 14px; }

  .lb-empty {
    padding: 48px 24px; text-align: center;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em;
  }
  .spinner-ring {
    width: 24px; height: 24px;
    border: 2px solid var(--border2); border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--dim); text-align: center; margin-top: 14px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82); backdrop-filter: blur(6px);
    z-index: 200; display: none;
    align-items: flex-start; justify-content: center;
    padding: 60px 20px 40px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px; width: 100%; max-width: 460px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    margin: auto; animation: modalIn 0.2s ease;
    position: relative;
  }
  @keyframes modalIn { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:none} }

  .modal-head {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .modal-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }
  .modal-team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 0.05em; line-height: 1; margin: 4px 0 2px;
  }
  .modal-total-wrap { text-align: right; flex-shrink: 0; }
  .modal-total-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }
  .modal-total {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; color: var(--gold);
    line-height: 1; letter-spacing: 0.02em;
  }

  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.2s;
  }
  .modal-close:hover { color: var(--text); background: var(--border); }

  .modal-body { padding: 6px 0 4px; }

  .player-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.12s;
  }
  .player-row:last-child { border-bottom: none; }
  .player-row:hover { background: rgba(255,255,255,0.03); }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; font-size: 15px;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .player-hr {
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: var(--gold); min-width: 52px; text-align: right;
  }
  .player-hr.no-data { color: var(--dim); }

  @media (max-width: 600px) {
    .lb-row { grid-template-columns: 36px 1fr auto 60px 12px; gap: 8px; padding: 12px 16px; }
    .row-hr { font-size: 22px; }
    main { padding: 20px 16px 60px; }
    .header-inner { padding: 16px 16px 0; }
    .tab { padding: 10px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="white" stroke-width="1.5"/>
          <path d="M6 10.5L8.5 13L14 7.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>MARQUEE <span>HR POOL</span> 2026</h1>
        <p>Live Season Tracker</p>
      </div>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">—</span>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-league="marquee">🏆 Marquee HR Pool</button>
      <button class="tab" data-league="highrollers">💰 High Rollers</button>
      <button class="tab" data-league="extra">➕ Extra Lineups</button>
    </nav>
  </div>
</header>

<main id="main">
  <div id="view-marquee" class="league-view active"></div>
  <div id="view-highrollers" class="league-view"></div>
  <div id="view-extra" class="league-view"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-head">
      <div>
        <div class="modal-meta">Team Roster</div>
        <div class="modal-team-name" id="modal-name"></div>
        <div class="modal-meta" id="modal-owner"></div>
      </div>
      <div class="modal-total-wrap">
        <div class="modal-total-label">2026 HR</div>
        <div class="modal-total" id="modal-total">—</div>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  LEAGUE DATA
// ═══════════════════════════════════════════════
const LEAGUES = {
  marquee: {
    label: 'Marquee HR Pool',
    teams: [
      { name: 'Chris Antonacci', players: ['Nick Kurtz', 'Colson Montgomery', 'Daulton Varsho', 'Ronald Acuña Jr.', 'Austin Riley', 'Max Muncy', 'Mookie Betts', 'Adolis García'] },
      { name: 'Andrew Miller', players: ['Aaron Judge', 'Austin Riley', 'Ronald Acuña Jr.', 'Carlos Correa', 'J.T. Realmuto', 'Mitch Garver', 'Willson Contreras', 'Brent Rooker'] },
      { name: 'Kyle Millinowisch', players: ['Colton Cowser', 'Giancarlo Stanton', 'Isaac Paredes', 'Colson Montgomery', 'Brice Turang', 'Brent Rooker', 'Ronald Acuña Jr.', 'Corey Seager'] },
      { name: 'Tony Bennett', players: ['Juan Soto', 'Ronald Acuña Jr.', 'Ozzie Albies', 'Matt Olson', 'Gunnar Henderson', 'Austin Riley', 'Jarren Duran', 'Andrew Vaughn'] },
      { name: 'Grace O’Malley', players: ['Gunnar Henderson', 'Ben Rice', 'Isaac Paredes', 'Vladimir Guerrero Jr.', 'Matt Olson', 'José Ramírez', 'Luis Robert Jr.', 'Adley Rutschman'] },
      { name: 'Cole Wright', players: ['Alex Bregman', 'Pete Crow-Armstrong', 'Bobby Witt Jr.', 'Michael Busch', 'Jackson Merrill', 'Ronald Acuña Jr.', 'Marcus Semien', 'Luis Robert Jr.'] },
      { name: 'Nick Steger', players: ['Vladimir Guerrero Jr.', 'Ronald Acuña Jr.', 'Mookie Betts', 'Colson Montgomery', 'Elly De La Cruz', 'Oneil Cruz', 'Kyle Tucker', 'Wyatt Langford'] },
      { name: 'Tony Andracki', players: ['Austin Riley', 'Gunnar Henderson', 'Matt Wallner', 'Tyler Soderstrom', 'Ronald Acuña Jr.', 'Bobby Witt Jr.', 'Wyatt Langford', 'Vladimir Guerrero Jr.'] },
      { name: 'Justin Hathaway', players: ['Alex Bregman', 'Nick Kurtz', 'Christian Walker', 'Ronald Acuña Jr.', 'Bobby Witt Jr.', 'Vladimir Guerrero Jr.', 'JJ Bleday', 'Paul Goldschmidt'] },
      { name: 'Lily Schumacher', players: ['Ronald Acuña Jr.', 'Kyle Tucker', 'Vladimir Guerrero Jr.', 'Bobby Witt Jr.', 'Elly De La Cruz', 'Corey Seager', 'Mookie Betts', 'Michael Harris II'] },
      { name: 'Lance Brozdowski', players: ['Nick Kurtz', 'Kyle Tucker', 'Ronald Acuña Jr.', 'Bobby Witt Jr.', 'Austin Riley', 'Daulton Varsho', 'Gunnar Henderson', 'Jake Burger'] },
      { name: 'Emily Bahnfleth', players: ['Nick Kurtz', 'Bobby Witt Jr.', 'Pete Crow-Armstrong', 'Colson Montgomery', 'Ronald Acuña Jr.', 'Alex Bregman', 'Francisco Alvarez', 'Willi Castro'] },
      { name: 'Derek Jensen', players: ['Aaron Judge', 'Alex Bregman', 'Jonathan Aranda', 'Iván Herrera', 'Colson Montgomery', 'Ronald Acuña Jr.', 'Daylen Lile', 'Gunnar Henderson'] },
      { name: 'Ryan Sweeney', players: ['Alex Bregman', 'Bobby Witt Jr.', 'Vladimir Guerrero Jr.', 'Cody Bellinger', 'Jarren Duran', 'Elly De La Cruz', 'Lawrence Butler', 'Isaac Paredes'] },
      { name: 'Marco Moy', players: ['Shohei Ohtani', 'Fernando Tatis Jr.', 'Oneil Cruz', 'Austin Riley', 'J.T. Realmuto', 'Royce Lewis', 'Elly De La Cruz', 'Ezequiel Tovar'] },
      { name: 'Alex Cohen', players: ['Aaron Judge', 'Kyle Tucker', 'Ronald Acuña Jr.', 'Gunnar Henderson', 'Austin Riley', 'Jake Burger', 'Marcus Semien', 'Nolan Arenado'] },
      { name: 'Vince Lodl', players: ['Shohei Ohtani', 'Nick Kurtz', 'Jackson Chourio', 'Jake Burger', 'Andrew Vaughn', 'Francisco Alvarez', 'Tyler O’Neill', 'Adley Rutschman'] }
    ]
  },
  highrollers: {
    label: 'High Rollers',
    teams: [
      { name: 'Lance 1',  owner: 'Lance',  players: ['Nick Kurtz','Kyle Tucker','Ronald Acuña Jr.','Bobby Witt Jr.','Austin Riley','Daulton Varsho','Gunnar Henderson','Jake Burger'] },
      { name: 'Lance 2',  owner: 'Lance',  players: ['Nick Kurtz','Julio Rodríguez','Pete Alonso','Ronald Acuña Jr.','Dominic Canzone','Austin Riley','Ryan Jeffers','Ezequiel Tovar'] },
      { name: 'Steger 1', owner: 'Steger', players: ['Brent Rooker','Vladimir Guerrero Jr.','Bobby Witt Jr.','Ronald Acuña Jr.','Austin Riley','Jake Burger','Kyle Tucker','Corey Seager'] },
      { name: 'Steger 2', owner: 'Steger', players: ['Pete Alonso','Vladimir Guerrero Jr.','Ronald Acuña Jr.','Colson Montgomery','Elly De La Cruz','Mookie Betts','Gunnar Henderson','Ezequiel Tovar'] },
      { name: 'Cohen 1',  owner: 'Cohen',  players: ['Pete Alonso','José Ramírez','Wyatt Langford','Kyle Tucker','Ronald Acuña Jr.','Jackson Merrill','Jonathan Aranda','Tyler O’Neill'] },
      { name: 'Cohen 2',  owner: 'Cohen',  players: ['Shohei Ohtani','Brent Rooker','Jake Burger','Matt McLain','Luis Robert Jr.','Austin Riley','Andrew Vaughn','Jorge Soler'] }
    ]
  },
  extra: {
    label: 'Extra Lineups',
    teams: []
  }
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let hrData = {};
let dataLoaded = false;
let lastFetch = 0;
const CACHE_TTL = 5 * 60 * 1000;
let activeLeague = 'marquee';
let openDetail = null;  // { leagueKey, teamName }

// ═══════════════════════════════════════════════
//  MLB API
// ═══════════════════════════════════════════════
async function fetchHR(force) {
  const now = Date.now();
  if (!force && dataLoaded && now - lastFetch < CACHE_TTL) return;

  setStatus('loading', 'Loading…');
  try {
    const r = await fetch(
      'https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&season=2026&limit=2000'
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    const splits = json?.stats?.[0]?.splits || [];
    const fresh = {};
    for (const s of splits) {
      const n = s.player?.fullName;
      const h = s.stat?.homeRuns;
      if (n && h != null) fresh[n] = h;
    }
    if (Object.keys(fresh).length === 0) throw new Error('empty');
    hrData = fresh;
    dataLoaded = true;
    lastFetch = now;
    setStatus('live', 'Live');
    renderAll();
    if (openDetail) populateModal(openDetail.leagueKey, openDetail.teamName);
  } catch(e) {
    console.warn('MLB API error:', e);
    setStatus('error', 'Offline');
    if (!dataLoaded) renderAll();
  }
}

function setStatus(cls, txt) {
  document.getElementById('status-dot').className = 'status-dot ' + cls;
  document.getElementById('status-text').textContent = txt;
}

// ═══════════════════════════════════════════════
//  HR LOOKUP
// ═══════════════════════════════════════════════
function getHR(name) {
  if (hrData[name] != null) return hrData[name];
  const last = name.split(' ').pop().toLowerCase();
  for (const [k, v] of Object.entries(hrData)) {
    if (k.toLowerCase().split(' ').pop() === last) return v;
  }
  return null;
}

function teamTotal(players) {
  let total = 0, any = false;
  for (const p of players) {
    const h = getHR(p);
    if (h != null) { total += h; any = true; }
  }
  return any ? total : null;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  Object.keys(LEAGUES).forEach(renderLeague);
}

function renderLeague(key) {
  const el = document.getElementById('view-' + key);
  if (!el) return;
  const league = LEAGUES[key];
  const teams = league.teams;

  let inner;
  if (!dataLoaded) {
    inner = `<div class="lb-empty"><div class="spinner-ring"></div>Fetching live data…</div>`;
  } else if (!teams.length) {
    inner = `<div class="lb-empty">Lineups coming soon</div>`;
  } else {
    const ranked = teams
      .map(t => ({ ...t, total: teamTotal(t.players) }))
      .sort((a, b) => {
        if (a.total == null && b.total == null) return 0;
        if (a.total == null) return 1;
        if (b.total == null) return -1;
        return b.total - a.total;
      });

    const maxHR = Math.max(...ranked.map(t => t.total || 0), 1);
    const rankClass = ['gold-row','silver-row','bronze-row'];

    inner = ranked.map((t, i) => {
      const cls = rankClass[i] || 'rest-row';
      const pct = Math.round(((t.total || 0) / maxHR) * 100);
      const hrText = t.total != null ? t.total : (dataLoaded ? '0' : '—');
      const noData = t.total == null;
      return `<div class="lb-row ${cls}" data-league="${key}" data-team="${esc(t.name)}">
        <div class="rank-num">${i + 1}</div>
        <div class="row-info">
          <div class="row-name">${esc(t.name)}</div>
          ${t.owner ? `<div class="row-owner">${esc(t.owner)}</div>` : ''}
        </div>
        <div class="row-hr${noData ? ' no-data' : ''}">${hrText}</div>
        <div class="row-bar-track"><div class="row-bar-fill" style="width:${pct}%"></div></div>
        <div class="row-chevron">›</div>
      </div>`;
    }).join('');
  }

  const ts = lastFetch ? `Updated ${timeAgo(lastFetch)}` : '';
  el.innerHTML = `
    <div class="lb-card">
      <div class="lb-header">
        <div>
          <div class="lb-title">${esc(league.label)}</div>
          <div class="lb-subtitle">2026 Season Home Runs</div>
        </div>
        <button class="refresh-btn" id="refresh-${key}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 2.5A6.5 6.5 0 1 1 10 1"/>
            <polyline points="10,1 13.5,2.5 12,6"/>
          </svg>
        </button>
      </div>
      ${inner}
    </div>
    ${ts ? `<div class="last-updated">${ts}</div>` : ''}
  `;

  // Row click handlers
  el.querySelectorAll('.lb-row').forEach(row => {
    row.addEventListener('click', () => {
      openModal(row.dataset.league, row.dataset.team);
    });
  });

  // Refresh button
  const btn = document.getElementById('refresh-' + key);
  if (btn) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      btn.classList.add('spinning');
      lastFetch = 0; dataLoaded = false;
      fetchHR(true).finally(() => btn.classList.remove('spinning'));
    });
  }
}

// ═══════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════
function openModal(leagueKey, teamName) {
  openDetail = { leagueKey, teamName };
  populateModal(leagueKey, teamName);
  document.getElementById('modal').classList.add('open');
}

function populateModal(leagueKey, teamName) {
  const team = LEAGUES[leagueKey]?.teams?.find(t => t.name === teamName);
  if (!team) return;
  const total = teamTotal(team.players);
  document.getElementById('modal-name').textContent = team.name;
  document.getElementById('modal-owner').textContent = team.owner ? 'Owner: ' + team.owner : '';
  document.getElementById('modal-total').textContent = total != null ? total : '—';
  document.getElementById('modal-body').innerHTML = (team.players || []).map(name => {
    const hr = getHR(name);
    return `<div class="player-row">
      <div class="player-name">${esc(name)}</div>
      <div class="player-hr${hr == null ? ' no-data' : ''}">${hr != null ? hr + ' HR' : '—'}</div>
    </div>`;
  }).join('');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  openDetail = null;
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
(function init() {
  // Tabs
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.league-view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    activeLeague = tab.dataset.league;
    document.getElementById('view-' + activeLeague).classList.add('active');
  });

  // Modal close
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Initial render + data fetch
  renderAll();
  fetchHR();

  // Auto-refresh every 5 min
  setInterval(() => fetchHR(), CACHE_TTL);
})();
</script>
